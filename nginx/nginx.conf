events {
    # Basic events block; required even if empty
}

http {
    # Define a shared memory zone for rate limiting
    limit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/s;

    server {
        listen 443 ssl;
        # listen 80;
        server_name localhost;

        # Paths to your self-signed certificate and key
        ssl_certificate /etc/nginx/dev.crt;
        ssl_certificate_key /etc/nginx/dev.key;

        # Emit relative redirects so the client's host:port is preserved
        absolute_redirect off;

        # Allow large uploads globally (refined per-location where needed)
        client_max_body_size 500M;

        # Apply rate limiting globally
        limit_req zone=mylimit burst=10 nodelay; # apply rate limit to all endpoints

        location = /api/users {
            return 301 /api/users/$is_args$args;
        }
        location /api/users/ {
            limit_req zone=mylimit burst=30 nodelay;
            proxy_pass http://user-service:5001/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Upload API
        location = /api/upload {
            return 301 /api/upload/$is_args$args;
        }
        location /api/upload/ {
            limit_req zone=mylimit burst=30 nodelay;
            proxy_pass http://upload-service:5002/;
            client_max_body_size 500M;
            proxy_read_timeout 300;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/status {
            proxy_pass http://upload-service:5002/status;
        }

        location = /api/videos {
            return 301 /api/videos/$is_args$args;
        }
        location /api/videos/ {
            limit_req zone=mylimit burst=30 nodelay;
            proxy_pass http://metadata-service:5003/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location = /api/stream {
            return 301 /api/stream/$is_args$args;
        }
        location /api/stream/ {
            limit_req zone=mylimit burst=30 nodelay;
            proxy_pass http://streaming-service:5004/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location = /api/views {
            return 301 /api/views/$is_args$args;
        }
        location /api/views/ {
            limit_req zone=mylimit burst=30 nodelay;
            proxy_pass http://streaming-service:5004/views/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Health check route without rate limiting for the school service
        location /health/users {
            # Disable rate limiting for this route
            proxy_pass http://user-service:5001/health;
        }

        location /health/upload {
            # Disable rate limiting for this route
            proxy_pass http://upload-service:5002/health;
        }

        location /health/metadata {
            # Disable rate limiting for this route
            proxy_pass http://metadata-service:5003/health;
        }

        location /health/streaming {
            # Disable rate limiting for this route
            proxy_pass http://streaming-service:5004/health;
        }

        # Docs: proxy to each service's Swagger UI and OpenAPI spec
        location /api/users/docs {
            proxy_pass http://user-service:5001/docs;
        }
        location /api/users/openapi.json {
            proxy_pass http://user-service:5001/openapi.json;
        }

        location /api/upload/docs {
            proxy_pass http://upload-service:5002/docs;
        }
        location /api/upload/openapi.json {
            proxy_pass http://upload-service:5002/openapi.json;
        }

        location /api/videos/docs {
            proxy_pass http://metadata-service:5003/docs;
        }
        location /api/videos/openapi.json {
            proxy_pass http://metadata-service:5003/openapi.json;
        }

        location /api/stream/docs {
            proxy_pass http://streaming-service:5004/docs;
        }
        location /api/stream/openapi.json {
            proxy_pass http://streaming-service:5004/openapi.json;
        }

        # Serve frontend static files
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
